<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IFC Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
<script type="module">

import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';

// 👇ここが重要（?module付き）
import { IFCLoader } from 'https://unpkg.com/web-ifc-three@0.0.125/IFCLoader.js?module';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(8, 13, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ライト
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// IFCローダー
const loader = new IFCLoader();

// 👇これ絶対必要
loader.ifcManager.setWasmPath("https://unpkg.com/web-ifc@0.0.42/");

// 読み込み
loader.load('./model.ifc', (model) => {
    scene.add(model);
});

// 描画
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
