<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IFC Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
import { IFCLoader } from 'https://unpkg.com/web-ifc-three@0.0.125/IFCLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(8, 13, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ライト追加（見やすくする）
const light1 = new THREE.DirectionalLight(0xffffff, 1);
light1.position.set(10, 10, 10);
scene.add(light1);

const light2 = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(light2);

// IFCローダー
const loader = new IFCLoader();

// これ重要（バージョン合わせ）
loader.ifcManager.setWasmPath("https://unpkg.com/web-ifc@0.0.42/");

// 読み込み
loader.load('./model.ifc', (model) => {
    scene.add(model);
});

// アニメーション
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
